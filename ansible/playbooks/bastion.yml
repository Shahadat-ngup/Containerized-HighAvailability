---
# Bastion playbook - HAProxy Docker container approach
- name: Deploy Bastion Hosts with HAProxy
  hosts: bastion
  become: yes
  vars:
    domain_name: "keycloak.ipb.pt"
    keepalived_vip_cidr: 27
    vip: "193.136.194.100"
    interface: "enX0"

  tasks:
    - name: Stop and disable system nginx service
      systemd:
        name: nginx
        state: stopped
        enabled: no
        daemon_reload: yes
      ignore_errors: yes

    - name: Remove system nginx package completely
      apt:
        name: nginx
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Remove old nginx containers
      shell: docker rm -f iam-bastion-nginx-1 nginx-exporter || true
      ignore_errors: yes

    - name: Install required packages
      apt:
        name:
          - keepalived
          - curl
          - docker.io
          - docker-compose
          - psmisc
        state: present
        update_cache: yes

    - name: Deploy HAProxy health check script for keepalived
      template:
        src: ../templates/check_haproxy.sh.j2
        dest: /etc/keepalived/check_haproxy.sh
        owner: root
        group: root
        mode: "0755"

    - name: Ensure check_haproxy.sh is executable
      file:
        path: /etc/keepalived/check_haproxy.sh
        mode: "0755"
        owner: root
        group: root
        state: file

    - name: Ensure check_haproxy.sh is owned by root
      ansible.builtin.command:
        cmd: chown root:root /etc/keepalived/check_haproxy.sh
      become: yes
      changed_when: false

    - name: Template keepalived config for public VIP with HAProxy tracking
      template:
        src: "../templates/keepalived-haproxy.conf.j2"
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      vars:
        vrrp_instance_name: "PUBLICVIP"
        keepalived_vrid: 50
        keepalived_vip: "{{ vip }}" # Set your public VIP here
        enable_haproxy_tracking: true

    - name: Restart keepalived for public VIP
      systemd:
        name: keepalived
        state: restarted
        enabled: yes

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - /opt/iam-bastion
        - /etc/ssl/private

    - name: Copy Keycloak SSL certificates
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/keycloak.ipb.pt.pem"
          dest: /etc/ssl/certs/keycloak.ipb.pt.pem
          mode: "0644"
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/keycloak.ipb.pt.key"
          dest: /etc/ssl/private/keycloak.ipb.pt.key
          mode: "0600"
      ignore_errors: yes

    - name: Copy Grafana SSL certificates (both) to all bastions
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/grafana1.ccom.ipb.pt.pem"
          dest: /etc/ssl/certs/grafana1.ccom.ipb.pt.pem
          mode: "0644"
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/grafana1.ccom.ipb.pt.key"
          dest: /etc/ssl/private/grafana1.ccom.ipb.pt.key
          mode: "0600"
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/grafana2.ccom.ipb.pt.pem"
          dest: /etc/ssl/certs/grafana2.ccom.ipb.pt.pem
          mode: "0644"
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/grafana2.ccom.ipb.pt.key"
          dest: /etc/ssl/private/grafana2.ccom.ipb.pt.key
          mode: "0600"
      ignore_errors: yes

    - name: Create combined SSL PEM files for HAProxy
      shell: |
        cat /etc/ssl/certs/{{ domain_name }}.pem /etc/ssl/private/{{ domain_name }}.key > /etc/ssl/certs/{{ domain_name }}.combined.pem
        cat /etc/ssl/certs/grafana1.ccom.ipb.pt.pem /etc/ssl/private/grafana1.ccom.ipb.pt.key > /etc/ssl/certs/grafana1.ccom.ipb.pt.combined.pem
        cat /etc/ssl/certs/grafana2.ccom.ipb.pt.pem /etc/ssl/private/grafana2.ccom.ipb.pt.key > /etc/ssl/certs/grafana2.ccom.ipb.pt.combined.pem
        chmod 644 /etc/ssl/certs/*.combined.pem
      args:
        creates: /etc/ssl/certs/{{ domain_name }}.combined.pem

    - name: Template HAProxy configuration
      template:
        src: "../templates/haproxy.cfg.j2"
        dest: /opt/iam-bastion/haproxy.cfg
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy HAProxy Docker Compose configuration
      copy:
        src: "{{ playbook_dir }}/../../docker/bastion/docker-compose-haproxy.yml"
        dest: /opt/iam-bastion/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
        remote_src: no

    - name: Start Docker HAProxy service
      shell: |
        cd /opt/iam-bastion
        docker compose down || true
        docker compose up -d
      register: docker_result

    - name: Show Docker compose output
      debug:
        var: docker_result

    - name: Wait for HAProxy HTTP to be ready
      wait_for:
        port: 80
        host: "{{ ansible_default_ipv4.address }}"
        delay: 10
        timeout: 60

    - name: Wait for HAProxy HTTPS to be ready
      wait_for:
        port: 443
        host: "{{ ansible_default_ipv4.address }}"
        delay: 10
        timeout: 60

    - name: Test HAProxy container health
      uri:
        url: "http://{{ ansible_default_ipv4.address }}:80/"
        method: GET
        timeout: 10
        follow_redirects: none
      register: haproxy_health
      ignore_errors: yes

    - name: Display HAProxy health result
      debug:
        msg: "HAProxy container: {{ 'HEALTHY' if haproxy_health.status == 301 or haproxy_health.status == 302 else 'UNHEALTHY' }}"

    - name: Display service endpoints
      debug:
        msg: |
          Bastion services deployed on {{ ansible_hostname }} ({{ ansible_default_ipv4.address }}):
          - HTTP: http://{{ ansible_default_ipv4.address }}:80 (redirects to HTTPS)
          - HTTPS: https://{{ ansible_default_ipv4.address }}:443
          - Keycloak: https://{{ domain_name }}
          - Grafana1: https://grafana1.ccom.ipb.pt
          - Grafana2: https://grafana2.ccom.ipb.pt
          - Prometheus: http://{{ ansible_default_ipv4.address }}:9090 (with auth)
          - Loki: http://{{ ansible_default_ipv4.address }}:3101 (with auth)
