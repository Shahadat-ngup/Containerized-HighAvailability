---
- name: Backend Setup Phase (Persistent Volume)
  hosts: postgres_cluster
  become: yes
  vars:
    domain_name: "{{ lookup('env', 'DOMAIN_NAME') | default('keycloak.ipb.pt', true) }}"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    admin_password: "{{ lookup('env', 'KC_BOOTSTRAP_ADMIN_PASSWORD') }}"
    etcd_token: "{{ lookup('env', 'ETCD_TOKEN') | default('etcd-cluster-patroni', true) }}"
    keepalived_vip_cidr: "{{ lookup('env', 'KEEPALIVED_VIP_CIDR') | default(23, true) }}"
    interface: "{{ lookup('env', 'INTERFACE') | default('enX0', true) }}"
    # Keepalived defaults for DB VIP
    vrrp_instance_name: "DBVIP"
    keepalived_vrid: 51
    keepalived_vip: "172.29.65.100"
    enable_patroni_tracking: true
    enable_nginx_tracking: false
    enable_rise_fall: false
    enable_log_detail: false

  pre_tasks:
    - name: Build Patroni image
      include_tasks: patroni-image-tasks.yml
    - name: Create .env file for Docker Compose
      copy:
        content: |
          # Backend environment variables for Keycloak + PostgreSQL deployment
          NODE_ID={{ postgres_node_id }}
          NODE_IP={{ ansible_default_ipv4.address }}
          DOMAIN_NAME={{ domain_name }}
          POSTGRES_DB=keycloak
          POSTGRES_USER=keycloak
          POSTGRES_PASSWORD={{ POSTGRES_PASSWORD }}
          REPLICATOR_PASSWORD={{ REPLICATOR_PASSWORD }}
          DB_URL=jdbc:postgresql://{{ ansible_default_ipv4.address }}:5432/keycloak
          ETCD_TOKEN={{ etcd_token | default('etcd-cluster-patroni') }}
          KC_BOOTSTRAP_ADMIN_USERNAME=admin
          KC_BOOTSTRAP_ADMIN_PASSWORD={{ POSTGRES_PASSWORD }}
          KC_HTTP_PORT=8080
          KC_LOG_LEVEL=INFO
          KC_PROXY_HEADERS=xforwarded
        dest: /opt/iam-backend/.env
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
    - name: Copy SSL certificates to backend hosts
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/{{ domain_name }}.pem"
          dest: /etc/ssl/certs/{{ domain_name }}.pem
          mode: "0644"
        - src: "{{ playbook_dir }}/../../secrets/.lego/certificates/{{ domain_name }}.key"
          dest: /etc/ssl/private/{{ domain_name }}.key
          mode: "0600"
      ignore_errors: yes
    - name: Ensure SSL directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /etc/ssl/certs
        - /etc/ssl/private

  tasks:
    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - curl
          - postgresql-client
        state: present
        update_cache: yes
    - name: Install keepalived for DB VIP
      apt:
        name: keepalived
        state: latest
        update_cache: yes
      tags: [keepalived]
    - name: Deploy Patroni leader check script for keepalived
      template:
        src: "../templates/check_patroni_leader.sh.j2"
        dest: /etc/keepalived/check_patroni_leader.sh
        owner: root
        group: root
        mode: "0755"
      tags: [keepalived]
    - name: Template keepalived config for DB VIP
      template:
        src: "../templates/keepalived.conf.j2"
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      tags: [keepalived]
    - name: Restart keepalived for DB VIP
      systemd:
        name: keepalived
        state: restarted
        enabled: yes
      tags: [keepalived]
    - name: Create backend deployment directory
      file:
        path: /opt/iam-backend
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
    - name: Stop and remove existing containers
      shell: |
        if [ -d "/opt/iam-backend" ]; then
          cd /opt/iam-backend
          docker compose down --remove-orphans || true
        fi
        docker rm -f etcd-backend{{ postgres_node_id }} patroni-backend{{ postgres_node_id }} keycloak-backend{{ postgres_node_id }} || true
        docker rm -f postgres-backend{{ postgres_node_id }} || true
      ignore_errors: yes

    # - name: Remove persistent Data volumes (PostgreSQL + etcd)
    #  shell: |
    #    docker volume rm iam-backend_postgres_data || true
    #    docker volume rm iam-backend_etcd_data || true
    #    sudo rm -rf /var/lib/docker/volumes/iam-backend_postgres_data || true
    #    sudo rm -rf /var/lib/docker/volumes/iam-backend_etcd_data || true
    #  ignore_errors: yes

    - name: Remove any old patroni.yml config
      file:
        path: /opt/iam-backend/patroni.yml
        state: absent
    - name: Copy Docker Compose configuration from repository
      copy:
        src: "{{ playbook_dir }}/../../docker/backend/docker-compose.yml"
        dest: /opt/iam-backend/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
        remote_src: no
    - name: Show NODE_IP from group_vars
      debug:
        var: NODE_IP
    - name: Map playbook vars to template vars for Patroni
      set_fact:
        NODE_IP: "{{ NODE_IP | default(ansible_host) }}"
        POSTGRES_PASSWORD: "{{ POSTGRES_PASSWORD | default(postgres_password) }}"
        REPLICATOR_PASSWORD: "{{ REPLICATOR_PASSWORD | default(replicator_password | default('SecureReplicatorPass2024')) }}"
    - name: Template latest patroni.yml config
      template:
        src: "{{ playbook_dir }}/../../docker/backend/patroni.yml.j2"
        dest: /opt/iam-backend/patroni.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
    - name: Validate patroni.yml is fully rendered (no Jinja2 variables left)
      shell: |
        if grep -q '\{\{' /opt/iam-backend/patroni.yml; then
          echo 'ERROR: patroni.yml contains unrendered Jinja2 variables.'
          exit 1
        fi
      register: patroni_render_check
      failed_when: patroni_render_check.rc != 0
      changed_when: false
    - name: Start infrastructure stack on backend1 (etcd, Patroni)
      shell: |
        cd /opt/iam-backend
        docker compose down --remove-orphans
        docker compose pull etcd-backend keycloak-backend
        docker compose up -d --build etcd-backend patroni-backend
      when: inventory_hostname == 'backend1'
      register: docker_result_backend1
      ignore_errors: yes

    - name: Start DB stack on backend2/backend3 (etcd, Patroni only)
      shell: |
        cd /opt/iam-backend
        docker compose down --remove-orphans
        docker compose pull etcd-backend
        docker compose up -d --build etcd-backend patroni-backend
      when: inventory_hostname != 'backend1'
      register: docker_result_other_backends
      ignore_errors: yes

    - name: Show Docker compose output for backend1
      debug:
        var: docker_result_backend1.stdout_lines
      when: inventory_hostname == 'backend1'

    - name: Show Docker compose output for backend2/backend3
      debug:
        var: docker_result_other_backends.stdout_lines
      when: inventory_hostname != 'backend1'
